<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Ruben Van Ruysseveldt">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Pinyon+Script&amp;display=swap');
      .mark { font-family: 'Pinyon Script', 'Segoe Script', 'Brush Script MT', cursive; }
    </style>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0B0B0C"/>
  <!-- film-frame border -->
  <rect x="6.5" y="6.5" width="51" height="51" rx="7" fill="none"
        stroke="#F4F3EF" stroke-opacity="0.20" stroke-width="1.6"/>
  <!-- calligraphic monogram -->
  <text class="mark" x="33" y="43" text-anchor="middle" font-size="50" fill="#F4F3EF">R</text>
</svg>
